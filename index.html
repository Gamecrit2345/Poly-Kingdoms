<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly Kingdoms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen">
        <div class="start-content">
            <h1>👑 Poly Kingdoms</h1>
            <p>Piliin ang iyong Kaharian</p>
            <input type="text" id="search" placeholder="Maghanap ng kingdom...">
            <div id="civ-list"></div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="container" class="hidden">
        <canvas id="canvas" width="960" height="640"></canvas>
        <div id="ui">
            <h1 id="kingdom-name">👑 San Jose del Monte Kingdom</h1>
            
            <div class="resource"><span>🍞 Pagkain</span> <span id="food">920</span></div>
            <div class="resource"><span>🪵 Kahoy</span> <span id="wood">720</span></div>
            <div class="resource"><span>🪨 Bato</span> <span id="stone">480</span></div>
            <div class="resource"><span>💎 Ginto</span> <span id="gold">320</span></div>

            <h3>🏗️ Mga Gusali</h3>
            <button class="btn" onclick="startPlacing('house')">🏠 Bahay</button>
            <button class="btn" onclick="startPlacing('farm')">🌾 Bukid</button>
            <button class="btn" onclick="startPlacing('townhall')">🏰 Castle</button>
            <button class="btn" onclick="startPlacing('barracks')">⚔️ Barracks</button>

            <h3>⚔️ Tropa</h3>
            <button class="btn" onclick="trainTroops(10)">👥 Sanayin 10 Warriors</button>
            <button class="btn" onclick="attackBarbarians()">🚀 Attack Barbarians</button>

            <div id="log"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
