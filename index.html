<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly Kingdoms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- KINGDOM SELECTION -->
    <div id="start-screen">
        <div class="start-content">
            <h1>👑 Poly Kingdoms</h1>
            <p>Piliin ang iyong Kaharian</p>
            <input type="text" id="search" placeholder="Maghanap ng kingdom...">
            <div id="civ-list"></div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="container" class="hidden">
        <canvas id="canvas" width="960" height="640"></canvas>
        
        <div id="ui">
            <h1 id="kingdom-name">👑 San Jose del Monte Kingdom</h1>
            
            <div class="resources">
                <div class="resource"><span>🍞 Pagkain</span> <span id="food">920</span></div>
                <div class="resource"><span>🪵 Kahoy</span> <span id="wood">720</span></div>
                <div class="resource"><span>🪨 Bato</span> <span id="stone">480</span></div>
                <div class="resource"><span>💎 Ginto</span> <span id="gold">320</span></div>
            </div>

            <h3>🏗️ Mga Gusali</h3>
            <button class="btn" onclick="startPlacing('house')">🏠 Bahay (80 Pagkain)</button>
            <button class="btn" onclick="startPlacing('farm')">🌾 Bukid (130 Pagkain)</button>
            <button class="btn" onclick="startPlacing('townhall')">🏰 Castle (250 Bato)</button>
            <button class="btn" onclick="startPlacing('barracks')">⚔️ Barracks (200 Kahoy)</button>

            <!-- BAGONG FARMING SYSTEM -->
            <h3>🌾 Farming / Gathering (Gamit Sundalo)</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px;">
                <button class="btn" onclick="startGathering('food', 8)">🌾 Food (8 troops)</button>
                <button class="btn" onclick="startGathering('wood', 8)">🪵 Wood (8 troops)</button>
                <button class="btn" onclick="startGathering('stone', 6)">🪨 Stone (6 troops)</button>
                <button class="btn" onclick="startGathering('gold', 5)">💎 Gold (5 troops)</button>
            </div>

            <h3>⚔️ Tropa</h3>
            <button class="btn" onclick="trainTroops(10)">👥 Sanayin 10 Warriors (100 Pagkain)</button>
            <button class="btn" onclick="attackBarbarians()">🚀 Attack Barbarians</button>

            <div id="log"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
